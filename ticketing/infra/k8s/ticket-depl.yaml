apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket
  template:
    metadata:
      labels:
        app: ticket
    spec:
      containers:
        - name: ticket-container
          image: adarsh893/ticket
          env:
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY
            - name: MONGO_URI
              value: "mongodb://ticket-mongo-cluster-ip-srv:27017/ticket"

---
apiVersion: v1
kind: Service
metadata:
  name: ticket-cluster-ip-srv
spec:
  selector:
    app: ticket
  ports:
    - name: ticket-port
      protocol: TCP
      port: 3001
      targetPort: 3001
