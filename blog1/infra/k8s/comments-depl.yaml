apiVersion: apps/v1
kind: Deployment
metadata:
  name: comments-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comments
  template:
    metadata:
      labels:
        app: comments
    spec:
      containers:
        - name: comments-container
          image: adarsh893/comments
---
apiVersion: v1
kind: Service
metadata:
  name: comments-cluster-srv
spec:
  selector:
    app: comments
  ports:
    - name: comments-port
      protocol: TCP
      port: 4001
      targetPort: 4001
